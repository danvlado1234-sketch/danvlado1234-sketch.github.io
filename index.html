<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:site_name" content='שיעורי הרה"ג רבי יצחק ולדומירסקי שליט"א'>
<meta property="og:title" content='שיעורי הרה"ג רבי יצחק ולדומירסקי שליט"א'>
<meta property="og:description" content="שיעורי תורה — שיעורי משנה יומיים ועוד.">
<meta property="og:url" content="https://danvlado1234-sketch.github.io/">
<meta property="og:image" content="https://danvlado1234-sketch.github.io/library.jpg">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "שיעורי הרה\"ג רבי יצחק ולדומירסקי שליט\"א",
  "alternateName": ["שיעורי הרב ולדומירסקי", "שיעורי משנה", "שיעורי משנה ולדומירסקי"],
  "url": "https://danvlado1234-sketch.github.io/"
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --cream:#f3e7c8; --brass:#c9a24b; --wine:#6d2733; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family:'Frank Ruhl Libre',serif; color:var(--cream);
    background:#1d120b; overflow:hidden;
  }

  /* ---- הספרייה: תמונה עם תנועת מצלמה איטית ---- */
  .bg {
    position:fixed; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:65% center;
    animation: kenburns 55s ease-in-out infinite alternate;
  }
  @keyframes kenburns {
    from { transform:scale(1.02) translateX(0); }
    to   { transform:scale(1.12) translateX(-2.5%); }
  }
  /* שכבת תאורה: מכהה את אזור הטקסט ושומרת על אור החלון */
  .glow {
    position:fixed; inset:0;
    background:
      linear-gradient(200deg, rgba(0,0,0,.05) 30%, rgba(20,10,5,.55) 75%, rgba(15,8,4,.82) 100%),
      radial-gradient(ellipse 70% 55% at 78% 88%, rgba(15,8,4,.45), transparent 65%);
  }

  /* ---- תוכן ---- */
  main {
    position:relative; z-index:2; height:100vh; height:100dvh;
    display:flex; flex-direction:column;
    padding:clamp(24px, 6vw, 72px);
  }
  .bsd { font-size:13px; color:var(--brass); text-shadow:0 1px 4px rgba(0,0,0,.9); }
  h1 { margin-top:auto; line-height:1.22; max-width:14em;
       text-shadow:0 2px 20px rgba(0,0,0,.95), 0 1px 3px rgba(0,0,0,.95); }
  h1 .of { display:block; font-size:clamp(19px, 4.6vw, 26px); font-weight:500;
           letter-spacing:.30em; color:var(--brass); margin-bottom:8px; }
  h1 .name { display:block; font-size:clamp(31px, 7.4vw, 56px); font-weight:900; }
  .menu { margin-top:clamp(26px, 5.5vh, 44px); margin-bottom:clamp(10px, 4vh, 40px);
          display:flex; flex-direction:column; gap:14px; align-items:flex-start; }
  .menu a {
    display:block; min-width:min(300px, 100%); padding:15px 22px;
    font-size:21px; font-weight:700; text-decoration:none; text-align:center;
    color:var(--cream); background:rgba(84,28,38,.78);
    border:1px solid var(--brass);
    box-shadow:0 8px 26px rgba(0,0,0,.6), inset 0 0 0 3px rgba(0,0,0,.18);
    backdrop-filter:blur(3px);
  }
  .menu a:hover { background:var(--wine); }
  .menu a:focus-visible { outline:3px solid var(--brass); outline-offset:3px; }

  @media (prefers-reduced-motion: reduce) { .bg { animation:none; } }
</style>
</head>
<body>
<img class="bg" src="library.jpg" alt="" aria-hidden="true">
<div class="glow" aria-hidden="true"></div>
<main>
  <p class="bsd">בס"ד</p>
  <h1>
    <span class="of">שיעורי</span>
    <span class="name">הרה"ג רבי יצחק ולדומירסקי שליט"א</span>
  </h1>
  <nav class="menu">
    <a href="https://danvlado1234-sketch.github.io/Shiurim-mishnhyot/">שיעורי משנה</a>
  </nav>
</main>
</body>
</html>
